name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: devc_api
        ports:
          - 15432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup npm
        run: npm install -g npm@11.3.0

      - name: Install dependencies
        run: npm ci

      - name: Apply database migrations
        run: npm run db:deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:15432/devc_api?schema=public

      - name: Run quality gate
        run: npm run check
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:15432/devc_api?schema=public
          JWT_SECRET: ci-access-secret-with-at-least-32-chars
          JWT_REFRESH_SECRET: ci-refresh-secret-with-at-least-32-chars

      - name: Run e2e tests
        run: npm run test:e2e
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:15432/devc_api?schema=public
          JWT_SECRET: ci-access-secret-with-at-least-32-chars
          JWT_REFRESH_SECRET: ci-refresh-secret-with-at-least-32-chars
